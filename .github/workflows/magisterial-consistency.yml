name: Magisterial Consistency Check

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  consistency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Add other dependencies if needed
      - name: Run Resonance Ritual
        run: |
          PYTHONPATH=. python3 mtp_ritual.py
